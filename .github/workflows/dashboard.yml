name: Dashboard CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'  # 当推送 v 开头的 tag 时触发
    paths:
      - 'dashboard/**'  # 仅当 dashboard 目录下的文件变更时触发
  pull_request:
    branches: [ "main" ]
    paths:
      - 'dashboard/**'

# 创建 Release 所需的内容写权限
permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: 准备代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10   # 明确指定 pnpm 大版本 (推荐)

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'  # 自动缓存 pnpm 依赖

      - name: 进入目录dashboard
        run: cd dashboard

      - name: 安装依赖
        run: pnpm install

      - name: 编译
        run: pnpm run build

      - name: 检查编译结果
        run: ls -lhR ./dist

      - name: 压缩代码
      run: |
          # 写入commit hash到文件中
          echo "${{ github.sha }}" > ./dist/commit_hash.txt
          # 压缩代码
          cd ./dist
          tar -czvf ../dist.tar.gz ./*
          cd ..

      # 使用社区 Action 支持覆盖
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist.tar.gz
          overwrite: true  # 覆盖已存在的Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




