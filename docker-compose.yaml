# ============================================================
# Nova Shop - 一键部署配置
# 前置：PostgreSQL 和 Redis 需提前完成初始化（见 README）
# 使用方式：docker compose up -d
# ============================================================

x-nova-shop-common: &nova-shop-common
  image: gogoshine/nova-shop:latest
  #image: gogoshine/nova-shop:sha-190a61f
  volumes:
    - /etc/localtime:/etc/localtime:ro   # 挂载主机时区
    - /etc/timezone:/etc/timezone:ro     # 挂载时区名称
    - nova-shop-media:/app/media         # 媒体文件持久化
  environment:
    # ── 应用核心 ──────────────────────────────────
    DEBUG: "False"
    SECRET_KEY: "changeme-replace-with-a-long-random-string"  # 生产环境必须修改！
    # ── 数据库（外部 PostgreSQL 服务器）────────────
    DATABASE_URL: "postgres://nova_shop:your_password@192.168.1.100:5432/nova_shop"  # 修改为实际地址
    # ── 缓存 & 消息队列（外部 Redis 服务器）────────
    CACHE_URL: "redis://192.168.1.100:6379/0"          # 修改为实际地址
    CELERY_BROKER_URL: "redis://192.168.1.100:6379/1"  # 修改为实际地址
    # ── 访问控制 ──────────────────────────────────
    ALLOWED_HOSTS: "localhost,127.0.0.1"        # 生产环境改为实际域名
    ALLOWED_CLIENT_HOSTS: "localhost,127.0.0.1" # 生产环境改为实际域名
    ALLOWED_GRAPHQL_ORIGINS: "*"
    # PUBLIC_URL: "https://api.example.com/"    # 生产环境取消注释并填入域名
    # ── 邮件 ──────────────────────────────────────
    DEFAULT_FROM_EMAIL: "noreply@example.com"
    # EMAIL_URL: "smtp://user:password@smtp.example.com:587/?tls=True"
    # ── 媒体 & 静态资源 ───────────────────────────
    MEDIA_URL: "/media/"
    STATIC_URL: "/static/"
    # ── 国际化 ────────────────────────────────────
    DEFAULT_COUNTRY: "CN"
    DEFAULT_CHANNEL_SLUG: "default-channel"
    POPULATE_DEFAULTS: "True"
    # ── 安全 ──────────────────────────────────────
    HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS: "False"
    # ── 可选功能 ──────────────────────────────────
    TIP_URL: ""
    SENTRY_DSN: ""         # 填入 Sentry DSN 启用错误监控
    RSA_PRIVATE_KEY: ""    # 填入 RSA 私钥启用 JWT 非对称加密
  restart: unless-stopped

services:
  # ──────────────────────────────────────────
  # Web API 服务
  # ──────────────────────────────────────────
  nova-shop:
    <<: *nova-shop-common
    container_name: nova-shop
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        uvicorn saleor.asgi:application
          --host=0.0.0.0
          --port=8000
          --workers=2
          --lifespan=off
          --ws=none
          --no-server-header
          --no-access-log
          --timeout-keep-alive=35
          --timeout-graceful-shutdown=30
          --limit-max-requests=10000
      "
    mem_limit: 4G
    memswap_limit: 4G
    cpus: '2.0'
    oom_score_adj: -500
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    #entrypoint: ["/bin/sh", "-c", "sleep 10000"]

  # ──────────────────────────────────────────
  # Celery Worker - 异步任务处理
  # ──────────────────────────────────────────
  celery:
    <<: *nova-shop-common
    container_name: nova-shop-celery
    command: celery -A saleor.celeryconf:app worker --loglevel=info --concurrency=2
    mem_limit: 2G
    memswap_limit: 2G
    cpus: '1.0'

  # ──────────────────────────────────────────
  # Celery Beat - 定时任务调度
  # ──────────────────────────────────────────
  celery-beat:
    <<: *nova-shop-common
    container_name: nova-shop-celery-beat
    command: celery -A saleor.celeryconf:app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    mem_limit: 512M
    memswap_limit: 512M
    cpus: '0.5'

  # ──────────────────────────────────────────
  # Dashboard - 管理后台 WebUI（Nginx 静态服务）
  # ──────────────────────────────────────────
  nova-shop-dashboard:
    image: gogoshine/nova-shop-dashboard:latest
    container_name: nova-shop-dashboard
    ports:
      - "9000:80"   # Nginx 监听 80，对外暴露 9000
    environment:
      # 运行时覆盖构建时默认值，无需重新构建镜像
      API_URL: "http://nova-shop:8000/graphql/"  # 指向后端 API 服务
      APP_MOUNT_URI: "/dashboard/"
      LOCALE_CODE: "ZH_Hans"  # 界面语言，可改为 EN
    depends_on:
      nova-shop:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256M
    memswap_limit: 256M
    cpus: '0.5'

  # ──────────────────────────────────────────
  # Storefront - 商店前台 WebUI（Next.js）
  # ──────────────────────────────────────────
  nova-shop-storefront:
    image: gogoshine/nova-shop-storefront:latest
    container_name: nova-shop-storefront
    ports:
      - "3000:3000"  # Next.js 监听 3000
    environment:
      # 注意：NEXT_PUBLIC_* 变量在构建时写入，运行时修改需重新构建镜像
      NEXT_PUBLIC_SALEOR_API_URL: "http://nova-shop:8000/graphql/"  # 修改为实际 API 地址
      NEXT_PUBLIC_STOREFRONT_URL: "http://localhost:3000"           # 修改为实际访问域名
      NEXT_PUBLIC_DEFAULT_CHANNEL: "default-channel"                # 修改为实际渠道 slug
    depends_on:
      nova-shop:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512M
    memswap_limit: 512M
    cpus: '0.5'

volumes:
  nova-shop-media:       # 媒体文件持久化
