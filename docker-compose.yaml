services:
  nova-shop:
    image: gogoshine/nova-shop:latest
    #image: gogoshine/nova-shop:sha-190a61f
    ports:
      - "30000:30000"
    volumes:
      - /etc/localtime:/etc/localtime:ro  # 挂载主机时区
      - /etc/timezone:/etc/timezone:ro    # 挂载时区名称（可选）
    environment:
      # 提示URL
      - TIP_URL=
    mem_limit: 4G     # 内存限制
    memswap_limit: 4G # 总内存（物理内存 + Swap）限制
    cpus: '2.0'       # CPU使用率限制为150%，即容器最多可以使用1.5个完整的CPU核心
    oom_score_adj: -500  # 调整 OOM 杀手优先级
    restart: unless-stopped  # 除非手动停止，否则总是重启容器
    container_name: nova-shop # 这里指容器名称，非必需，不指定时，名称为：<项目名称>-<服务名称>-<序号>
    #entrypoint: ["/bin/sh", "-c", "sleep 10000"]
